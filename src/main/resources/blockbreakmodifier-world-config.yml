# =============================================================================
#  BlockBreakModifier - PER-WORLD Config
#  Created by ELITE Studios | https://github.com/meyoxyt/Block-Break-Modifier
# =============================================================================
#
#  WHAT IS THIS FILE?
#  ------------------
#  This config applies ONLY to the singleplayer world whose folder name matches
#  the folder this file is stored in.
#
#  IMPORTANT: The global config overrides this file if the same block is
#  defined in both. Use the global config for changes you want everywhere.
#
#  HOW TO RELOAD WITHOUT RESTARTING
#  ---------------------------------
#  1. Edit and save this file (or the global config).
#  2. Go to the Singleplayer world selection screen.
#  3. Hover over your world in the list.
#  4. Click the "\u21BB BBM" button at the bottom-right of the entry.
#  5. Done - changes apply instantly in-game.
#
#  QUICK REFERENCE
#  ---------------
#  Replace ":" with "." in all block and tool IDs:
#    minecraft:obsidian        ->  minecraft.obsidian
#    minecraft:wooden_pickaxe  ->  minecraft.wooden_pickaxe
#    minecraft:air             ->  minecraft.air  (empty hand)
#
#  Breaking speed: higher = faster. 8.0 = diamond pickaxe on stone. 100.0 = instant.
#  Blast resistance: optional. 1200.0 = vanilla obsidian. 0.0 = TNT-destroyable.
#  Droppable: optional.
#    true  = force-drop the block item itself (like Silk Touch)
#    false = suppress all drops
#    (not set) = vanilla drop logic
#
# =============================================================================
#  EXAMPLES (uncomment to activate)
# =============================================================================
#
# blocks:
#   minecraft.stone:
#     blast-resistance: 0.0
#     droppable: true
#     breaking-tools:
#       minecraft.stone_pickaxe: 100.0
#       minecraft.iron_pickaxe: 100.0
#
