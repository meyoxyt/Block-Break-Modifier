# =============================================================================
#  BlockBreakModifier - GLOBAL Config
#  Created by ELITE Studios | https://github.com/meyoxyt/Block-Break-Modifier
# =============================================================================
#
#  WHAT IS THIS FILE?
#  ------------------
#  This is the GLOBAL config. Changes here apply to ALL singleplayer worlds
#  and to servers. If a world also has its own config folder, the global config
#  OVERRIDES any conflicting block entries in the per-world config.
#
#  FILE LOCATION
#  -------------
#  Global config (this file):
#    config/blockbreakmodifier/blockbreakmodifier-config.yml
#
#  Per-world config (auto-created on world join):
#    config/blockbreakmodifier/<WorldFolderName>/blockbreakmodifier-config.yml
#
#  CONFIG PRIORITY
#  ---------------
#  Per-world config is loaded first, then the global config is merged ON TOP.
#  If the same block is defined in both, the GLOBAL definition wins.
#
#  HOW TO USE THIS FILE
#  --------------------
#  1. Find the block ID you want to change (e.g. minecraft:obsidian)
#  2. Replace the ":" with "." in the ID (YAML limitation)
#     minecraft:obsidian  ->  minecraft.obsidian
#  3. Add it under "blocks:" with your desired tools and speeds
#  4. Use the in-game Reload button (world list screen, hover a world) OR
#     restart the game to apply changes.
#
#  BREAKING SPEED GUIDE
#  --------------------
#  Higher number = faster break. Values are floats.
#  Reference speeds:
#    1.0    = bare hand on dirt
#    4.0    = wooden pickaxe on stone
#    8.0    = diamond pickaxe on stone
#    30.0   = very fast
#    50.0   = near-instant
#    100.0  = instant
#
#  BLAST RESISTANCE GUIDE
#  ----------------------
#  Controls how resistant the block is to explosions.
#  blast-resistance is OPTIONAL. Remove the line to leave it vanilla.
#  Vanilla values:
#    Dirt          :     0.5
#    Stone         :     6.0
#    Obsidian      :  1200.0
#    Ancient Debris:  1200.0
#    Bedrock       :  3600000.0
#  Set to 0.0 to make a block fully destroyable by TNT.
#
#  TOOL ID REFERENCE
#  -----------------
#  minecraft.wooden_pickaxe    minecraft.stone_pickaxe
#  minecraft.iron_pickaxe      minecraft.golden_pickaxe
#  minecraft.diamond_pickaxe   minecraft.netherite_pickaxe
#  minecraft.wooden_shovel     minecraft.stone_shovel
#  minecraft.wooden_axe        minecraft.stone_axe
#  minecraft.shears
#  minecraft.air               <- empty hand (no item held)
#  <modid>.<tool_name>         <- any modded tool
#
#  FULL STRUCTURE REFERENCE
#  ------------------------
#  blocks:
#    <namespace>.<block_name>:
#      blast-resistance: <float>          # optional
#      breaking-tools:
#        <namespace>.<tool_name>: <speed> # one line per tool
#
# =============================================================================
#
#  EXAMPLES  (commented out - uncomment and edit to activate)
#
# --- Example 1: Obsidian with wooden pickaxe, near-instant ---
# blocks:
#   minecraft.obsidian:
#     blast-resistance: 10.0
#     breaking-tools:
#       minecraft.wooden_pickaxe: 50.0
#       minecraft.stone_pickaxe: 80.0
#       minecraft.iron_pickaxe: 100.0
#
# --- Example 2: Ancient Debris with golden pickaxe ---
# blocks:
#   minecraft.ancient_debris:
#     breaking-tools:
#       minecraft.golden_pickaxe: 60.0
#
# --- Example 3: Stone breakable with bare hands ---
# blocks:
#   minecraft.stone:
#     breaking-tools:
#       minecraft.air: 5.0
#
# --- Example 4: Multiple blocks at once ---
# blocks:
#   minecraft.obsidian:
#     blast-resistance: 10.0
#     breaking-tools:
#       minecraft.wooden_pickaxe: 50.0
#   minecraft.crying_obsidian:
#     blast-resistance: 10.0
#     breaking-tools:
#       minecraft.wooden_pickaxe: 50.0
#   minecraft.diamond_ore:
#     breaking-tools:
#       minecraft.wooden_pickaxe: 30.0
#
# --- Example 5: Custom modded block ---
# blocks:
#   somemod.custom_block:
#     blast-resistance: 5.0
#     breaking-tools:
#       minecraft.golden_pickaxe: 20.0
#
# =============================================================================

