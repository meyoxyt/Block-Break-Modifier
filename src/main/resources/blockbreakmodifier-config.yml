# =============================================================================
#  BlockBreakModifier - GLOBAL Config
#  Created by ELITE Studios | https://github.com/meyoxyt/Block-Break-Modifier
# =============================================================================
#
#  WHAT IS THIS FILE?
#  ------------------
#  This is the GLOBAL config. Entries here apply to ALL singleplayer worlds
#  AND to dedicated servers. If the same block is also configured in a world's
#  own config, the GLOBAL entry wins and overrides it.
#
#  WHERE ARE ALL CONFIG FILES?
#  ---------------------------
#  Global config (this file):
#    .minecraft/config/blockbreakmodifier/blockbreakmodifier-config.yml
#
#  Per-world configs (auto-created the first time you join each world):
#    .minecraft/config/blockbreakmodifier/<WorldFolderName>/blockbreakmodifier-config.yml
#
#  CONFIG PRIORITY
#  ---------------
#  Both configs are loaded and merged. Global always overrides world-specific
#  entries for the same block. Use the global config for changes you want
#  everywhere, and per-world configs for world-specific tweaks.
#
# =============================================================================
#  QUICK START GUIDE
# =============================================================================
#
#  STEP 1 - Find the block ID you want to change.
#    All Minecraft block IDs follow the format:  namespace:block_name
#    Examples:  minecraft:obsidian   minecraft:stone   minecraft:diamond_ore
#    Modded:    somemod:custom_block
#
#  STEP 2 - Replace ":" with "." in the ID.
#    YAML uses colons for its own syntax, so you must replace them with dots.
#    The mod converts them back to colons at runtime automatically.
#    minecraft:obsidian  ->  minecraft.obsidian
#
#  STEP 3 - Add it under the "blocks:" section with your settings.
#    Each block entry supports:
#      blast-resistance: <float>         (optional - leave out to keep vanilla)
#      droppable: <true/false>           (optional - controls item drops)
#      breaking-tools:
#        <tool_id>: <speed>              (one line per tool)
#
#  STEP 4 - Apply your changes WITHOUT restarting.
#    - Open the Singleplayer world selection screen.
#    - Hover your mouse over the world you want to reload for.
#    - Click the "↻ BBM" button that appears at the bottom-right of the entry.
#    - A chat message confirms the reload. Changes are instant.
#    (On servers a restart is currently required.)
#
# =============================================================================
#  BREAKING SPEED GUIDE
# =============================================================================
#
#  The speed value is a float. Higher = faster breaking.
#
#  Speed   |  Feel
#  --------|---------------------------------------------
#  1.0     |  Bare hand on dirt (very slow)
#  4.0     |  Wooden pickaxe on stone
#  8.0     |  Diamond pickaxe on stone (standard fast)
#  30.0    |  Very fast
#  50.0    |  Near-instant
#  100.0   |  Instant
#
#  Note: Efficiency enchantments still stack ON TOP of this base speed.
#
# =============================================================================
#  BLAST RESISTANCE GUIDE
# =============================================================================
#
#  Controls how resistant a block is to explosions (TNT, creepers, etc.).
#  This field is OPTIONAL per block. Leave it out to keep vanilla resistance.
#
#  Block           |  Vanilla Value
#  ----------------|---------------
#  Dirt            |  0.5
#  Stone           |  6.0
#  Obsidian        |  1200.0
#  Crying Obsidian |  1200.0
#  Ancient Debris  |  1200.0
#  Bedrock         |  3600000.0
#
#  Set to 0.0 to make a block fully destroyable by TNT.
#
# =============================================================================
#  DROPPABLE GUIDE
# =============================================================================
#
#  Controls whether a block drops an item when broken.
#  This field is OPTIONAL per block. Leave it out to use vanilla drop logic.
#
#  droppable: true
#    Forces the block ITSELF to drop as an item, regardless of tool or
#    enchantments. Useful for blocks that normally drop a different item
#    (e.g. stone drops cobblestone by default — set droppable: true to
#    force a stone item drop instead, like Silk Touch).
#
#  droppable: false
#    Completely suppresses all drops for this block. Nothing drops.
#
#  (not set)
#    Vanilla loot table logic runs normally. This is the default.
#
# =============================================================================
#  TOOL ID REFERENCE
# =============================================================================
#
#  Replace ":" with "." in all tool IDs, same as block IDs.
#
#  minecraft.wooden_pickaxe     minecraft.stone_pickaxe
#  minecraft.iron_pickaxe       minecraft.golden_pickaxe
#  minecraft.diamond_pickaxe    minecraft.netherite_pickaxe
#  minecraft.wooden_shovel      minecraft.stone_shovel
#  minecraft.iron_shovel        minecraft.golden_shovel
#  minecraft.diamond_shovel     minecraft.netherite_shovel
#  minecraft.wooden_axe         minecraft.stone_axe
#  minecraft.iron_axe           minecraft.golden_axe
#  minecraft.diamond_axe        minecraft.netherite_axe
#  minecraft.shears
#  minecraft.air                <-- empty hand (no item held)
#  <modid>.<tool_name>          <-- any modded tool
#
# =============================================================================
#  FULL STRUCTURE REFERENCE
# =============================================================================
#
#  blocks:
#    <namespace>.<block_name>:
#      blast-resistance: <float>             # optional
#      droppable: <true/false>               # optional
#      breaking-tools:
#        <namespace>.<tool_name>: <speed>    # one line per tool
#
# =============================================================================
#  EXAMPLES (all commented out - uncomment and edit to activate)
# =============================================================================
#
# --- Example 1: Stone breaks instantly with stone pickaxe, TNT-destroyable, drops itself ---
# blocks:
#   minecraft.stone:
#     blast-resistance: 0.0
#     droppable: true
#     breaking-tools:
#       minecraft.stone_pickaxe: 100.0
#       minecraft.iron_pickaxe: 100.0
#       minecraft.diamond_pickaxe: 100.0
#
# --- Example 2: Ancient Debris with golden pickaxe ---
# blocks:
#   minecraft.ancient_debris:
#     droppable: true
#     breaking-tools:
#       minecraft.golden_pickaxe: 60.0
#
# --- Example 3: Block breakable with bare hands (no drops) ---
#   (minecraft.air = no item held)
# blocks:
#   minecraft.stone:
#     droppable: false
#     breaking-tools:
#       minecraft.air: 5.0
#
# --- Example 4: Multiple blocks configured at once ---
# blocks:
#   minecraft.crying_obsidian:
#     blast-resistance: 0.0
#     droppable: true
#     breaking-tools:
#       minecraft.wooden_pickaxe: 100.0
#   minecraft.diamond_ore:
#     droppable: true
#     breaking-tools:
#       minecraft.wooden_pickaxe: 30.0
#   minecraft.netherrack:
#     blast-resistance: 0.0
#     droppable: false
#     breaking-tools:
#       minecraft.wooden_shovel: 10.0
#
# --- Example 5: Custom modded block ---
# blocks:
#   somemod.custom_block:
#     blast-resistance: 5.0
#     droppable: true
#     breaking-tools:
#       minecraft.golden_pickaxe: 20.0
#       minecraft.wooden_axe: 15.0
#
# =============================================================================

blocks:
  minecraft.obsidian:
    blast-resistance: 0.0
    droppable: true
    breaking-tools:
      minecraft.wooden_pickaxe: 100.0
      minecraft.stone_pickaxe: 100.0
      minecraft.iron_pickaxe: 100.0
      minecraft.golden_pickaxe: 100.0
      minecraft.diamond_pickaxe: 100.0
      minecraft.netherite_pickaxe: 100.0
